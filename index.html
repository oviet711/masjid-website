<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masjid Digital Production</title>

<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:#f4f8f5;color:#1c3b2f}
header{background:#198754;color:white;padding:15px 5%;display:flex;justify-content:space-between;align-items:center}
nav a{color:white;margin-left:20px;text-decoration:none}
section{padding:60px 5%}
h2{border-left:6px solid #c9a227;padding-left:10px}

/* GRID */
.post-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:20px}
.post-card{background:white;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.05)}

/* CALENDAR */
.calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.calendar-header button{background:#198754;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer}
.calendar-container{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;max-width:1100px;margin:auto}
.day-header{text-align:center;font-weight:bold;font-size:12px}
.calendar-box{background:white;border:1px solid #d4af37;border-radius:8px;padding:6px;font-size:10px;min-height:130px}
.calendar-box.today{background:#d1e7dd;border:2px solid #198754}
.masehi{font-weight:bold;font-size:14px}
.hijri{color:#8b5e00}
.jawa{color:#6c757d}
.cina{font-weight:bold;font-size:10px}

/* SHOLAT */
.prayer-box{background:white;padding:20px;border-radius:12px;max-width:500px;margin:auto;box-shadow:0 4px 10px rgba(0,0,0,.05)}
.prayer-item{display:flex;justify-content:space-between;padding:4px 0}
.highlight-fasting{background:#fff3cd;font-weight:bold}

iframe{width:100%;height:300px;border:0;border-radius:10px}
@media(max-width:900px){.post-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.post-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
<div><strong>Masjid Digital</strong></div>
<nav>
<a href="#kajian">Kajian</a>
<a href="#info">Info</a>
<a href="#materi">Materi</a>
<a href="#kontak">Kontak</a>
<a href="#peta">Peta</a>
</nav>
</header>

<section id="kajian"><h2>Kajian</h2>
<div class="post-grid">
<div class="post-card">Fiqih</div>
<div class="post-card">Tafsir</div>
<div class="post-card">Hadits</div>
<div class="post-card">Aqidah</div>
</div>
</section>

<section>
<h2>Kalender 4 Sistem</h2>
<div class="calendar-header">
<button onclick="changeMonth(-1)">◀</button>
<div id="monthYear"></div>
<button onclick="changeMonth(1)">▶</button>
</div>
<div class="calendar-container" id="calendar"></div>
</section>

<section>
<h2>Jadwal Sholat</h2>
<div class="prayer-box">
<label><input type="checkbox" id="geoToggle"> Aktifkan Lokasi Otomatis</label>
<div id="prayerTimes"></div>
</div>
</section>

<section id="kontak"><h2>Kontak</h2>Email: info@masjid.com</section>
<section id="peta"><h2>Peta</h2>
<iframe src="https://maps.google.com/maps?q=jakarta&output=embed"></iframe>
</section>

<script>
let currentDate=new Date();

/* ================= HIJRI ================= */
function getHijri(date){
try{
return new Intl.DateTimeFormat(
'id-TN-u-ca-islamic',
{day:'numeric',month:'short',year:'numeric'}
).format(date);
}catch(e){return "-";}
}

/* ================= JAWA ================= */
function getJawa(date){
const hari=["Ahad","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const pasaran=["Legi","Pahing","Pon","Wage","Kliwon"];
const epoch=new Date(1970,0,1);
const diff=Math.floor((date-epoch)/86400000);
return hari[date.getDay()]+" "+pasaran[(diff+4)%5];
}

/* ================= CINA ================= */
const stems=["Kayu","Kayu","Api","Api","Tanah","Tanah","Logam","Logam","Air","Air"];
const animals=["Tikus","Kerbau","Macan","Kelinci","Naga","Ular","Kuda","Kambing","Monyet","Ayam","Anjing","Babi"];
function getCina(date){
let y=date.getFullYear();
let stem=stems[(y-4)%10];
let animal=animals[(y-4)%12];
return animal+" ("+stem+")";
}

/* ================= RENDER ================= */
function renderCalendar(){
const cal=document.getElementById("calendar");
cal.innerHTML="";
let year=currentDate.getFullYear();
let month=currentDate.getMonth();

document.getElementById("monthYear").innerText=
currentDate.toLocaleString("id-ID",{month:"long",year:"numeric"});

let firstDay=new Date(year,month,1);
let lastDay=new Date(year,month+1,0);

["Ah","Sn","Sl","Rb","Km","Jm","Sb"].forEach(h=>{
let d=document.createElement("div");
d.className="day-header";
d.innerText=h;
cal.appendChild(d);
});

for(let i=0;i<firstDay.getDay();i++) cal.appendChild(document.createElement("div"));

for(let d=1;d<=lastDay.getDate();d++){
let date=new Date(year,month,d);
let box=document.createElement("div");
box.className="calendar-box";
if(date.toDateString()===new Date().toDateString()) box.classList.add("today");

box.innerHTML=`
<div class="masehi">${d}</div>
<div class="hijri">${getHijri(date)}</div>
<div class="jawa">${getJawa(date)}</div>
<div class="cina">${getCina(date)}</div>
`;
cal.appendChild(box);
}
}
renderCalendar();
function changeMonth(s){currentDate.setMonth(currentDate.getMonth()+s);renderCalendar();}

/* ================= SHOLAT ================= */
const DEFAULT_LAT=-6.2, DEFAULT_LON=106.8;
document.getElementById("geoToggle").addEventListener("change",function(){
if(this.checked && navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
fetchPrayer(pos.coords.latitude,pos.coords.longitude);
});
}else{fetchPrayer(DEFAULT_LAT,DEFAULT_LON);}
});
function fetchPrayer(lat,lon){
fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`)
.then(r=>r.json())
.then(data=>{
let times=data.data.timings;
let c=document.getElementById("prayerTimes");
c.innerHTML="";
["Imsak","Fajr","Dhuhr","Asr","Maghrib","Isha"].forEach(p=>{
let div=document.createElement("div");
div.className="prayer-item";
if(p==="Fajr"||p==="Maghrib")div.classList.add("highlight-fasting");
div.innerHTML=`<span>${p}</span><span>${times[p]}</span>`;
c.appendChild(div);
});
});
}
fetchPrayer(DEFAULT_LAT,DEFAULT_LON);
</script>

</body>
</html>
