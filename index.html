<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Kalender & Kontak</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

/* =======================
   NAVIGATION MENU
======================= */
nav {
    background: #b30000;
    padding: 10px;
}
nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 20px;
}
nav ul li {
    color: white;
    cursor: pointer;
    font-weight: bold;
}

/* =======================
   CONTENT
======================= */
.container {
    padding: 20px;
}

/* =======================
   CALENDAR BOX
======================= */
.calendar-box {
    background: #f5f5f5;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 30px;
}

.calendar-box h2 {
    margin-top: 0;
}

.calendar-item {
    margin-bottom: 10px;
    font-size: 18px;
}

/* =======================
   CONTACT + MAP SECTION
======================= */
.contact-map {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    flex-wrap: wrap;
}

.contact-info {
    flex: 1;
    min-width: 280px;
}

.map-box {
    flex: 1;
    min-width: 280px;
    max-width: 400px;
}

.map-box iframe {
    width: 100%;
    height: 250px;
    border-radius: 8px;
}

/* =======================
   FOOTER
======================= */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 40px;
}
</style>
</head>
<body>

<!-- =======================
     MENU KATEGORI
======================= -->
<nav>
    <ul>
        <li>Beranda</li>
        <li>Profil</li>
        <li>Produk</li>
        <li>Kategori</li>
        <li>Kontak</li>
    </ul>
</nav>

<div class="container">

    <!-- =======================
         KALENDER SECTION
    ======================= -->
    <div class="calendar-box">
        <h2>Kalender Hari Ini</h2>

        <div class="calendar-item" id="masehi"></div>
        <div class="calendar-item" id="china"></div>
    </div>

    <!-- =======================
         CONTACT + MAP
    ======================= -->
    <div class="contact-map">
        <div class="contact-info">
            <h2>Info Kontak</h2>
            <p><strong>Alamat:</strong> Jakarta, Indonesia</p>
            <p><strong>Telepon:</strong> 0812-3456-7890</p>
            <p><strong>Email:</strong> info@email.com</p>
        </div>

        <div class="map-box">
            <iframe 
                src="https://www.google.com/maps?q=jakarta&output=embed">
            </iframe>
        </div>
    </div>

</div>

<footer>
    © 2026 Website Anda
</footer>

<script>
/* ===========================
   KALENDER MASEHI
=========================== */
const today = new Date();

const optionsMasehi = {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
};

const masehiFormatter = new Intl.DateTimeFormat('id-ID', optionsMasehi);
document.getElementById("masehi").innerHTML =
    "<strong>Masehi:</strong> " + masehiFormatter.format(today);

/* ===========================
   KALENDER CHINA (LUNAR)
=========================== */

try {
    const optionsChina = {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        calendar: 'chinese'
    };

    const chinaFormatter = new Intl.DateTimeFormat('zh-CN-u-ca-chinese', optionsChina);

    document.getElementById("china").innerHTML =
        "<strong>Kalender Cina:</strong> " + chinaFormatter.format(today);

} catch (error) {
    document.getElementById("china").innerHTML =
        "<strong>Kalender Cina:</strong> Browser belum mendukung.";
}
</script>

</body>
</html>
