<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masjid Digital Stabil</title>

<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f8f5;
color:#1c3b2f
}
header{
background:#198754;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold
}
section{padding:40px 5%}
h2{
border-left:6px solid #c9a227;
padding-left:10px
}

/* POST GRID */
.post-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px
}
.post-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,.05)
}
.post-category{
font-size:12px;
color:#c9a227;
font-weight:bold
}
.post-title{
font-weight:bold;
margin:5px 0
}
.post-desc{
font-size:14px;
color:#555
}

/* CALENDAR */
.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px
}
.calendar-header button{
background:#198754;
color:white;
border:none;
padding:6px 14px;
border-radius:6px;
cursor:pointer
}
.calendar-container{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
max-width:1100px;
margin:auto
}
.day-header{
text-align:center;
font-weight:bold;
font-size:12px
}
.calendar-box{
background:white;
border:1px solid #d4af37;
border-radius:8px;
padding:6px;
font-size:11px;
min-height:80px
}
.calendar-box.today{
background:#d1e7dd;
border:2px solid #198754
}
.masehi{
font-weight:bold;
font-size:14px
}
.subtext{
font-size:10px;
color:#555
}

@media(max-width:900px){
.post-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
.post-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>Masjid Digital Ultra Stabil</header>

<section>
<h2>Kajian</h2>
<div class="post-grid">
<div class="post-card"><div class="post-category">Kajian</div><div class="post-title">Fiqih</div><div class="post-desc">Kajian rutin fiqih.</div></div>
<div class="post-card"><div class="post-category">Kajian</div><div class="post-title">Tafsir</div><div class="post-desc">Tafsir Al-Qur'an.</div></div>
<div class="post-card"><div class="post-category">Kajian</div><div class="post-title">Hadits</div><div class="post-desc">Kajian hadits shahih.</div></div>
<div class="post-card"><div class="post-category">Kajian</div><div class="post-title">Aqidah</div><div class="post-desc">Penguatan tauhid.</div></div>
</div>
</section>

<section>
<h2>Kalender Bulan Ini</h2>

<div class="calendar-header">
<button onclick="changeMonth(-1)">◀</button>
<div id="monthYear"></div>
<button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar-container" id="calendar"></div>

</section>

<script>
let currentDate=new Date();

/* JAWA */
function getJawa(date){
const hari=["Ahad","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const pasaran=["Legi","Pahing","Pon","Wage","Kliwon"];
return hari[date.getDay()]+" "+pasaran[Math.floor(date.getTime()/86400000)%5];
}

/* CINA SEDERHANA */
function getCina(date){
const animals=["Tikus","Kerbau","Macan","Kelinci","Naga","Ular","Kuda","Kambing","Monyet","Ayam","Anjing","Babi"];
let year=date.getFullYear();
return animals[(year-4)%12];
}

/* RENDER */
function renderCalendar(){

const calendar=document.getElementById("calendar");
calendar.innerHTML="";

let year=currentDate.getFullYear();
let month=currentDate.getMonth();

document.getElementById("monthYear").innerText=
currentDate.toLocaleString("id-ID",{month:"long",year:"numeric"});

let firstDay=new Date(year,month,1);
let lastDay=new Date(year,month+1,0);

const headers=["Ah","Sn","Sl","Rb","Km","Jm","Sb"];
headers.forEach(h=>{
let div=document.createElement("div");
div.className="day-header";
div.innerText=h;
calendar.appendChild(div);
});

for(let i=0;i<firstDay.getDay();i++){
calendar.appendChild(document.createElement("div"));
}

for(let d=1;d<=lastDay.getDate();d++){

let date=new Date(year,month,d);
let box=document.createElement("div");
box.className="calendar-box";

if(date.toDateString()===new Date().toDateString()){
box.classList.add("today");
}

box.innerHTML=`
<div class="masehi">${d}</div>
<div class="subtext">${getJawa(date)}</div>
<div class="subtext">Shio ${getCina(date)}</div>
`;

calendar.appendChild(box);
}
}

function changeMonth(step){
currentDate.setMonth(currentDate.getMonth()+step);
renderCalendar();
}

renderCalendar();
</script>

</body>
</html>
