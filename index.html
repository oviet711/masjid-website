<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masjid Digital</title>

<style>
body{
    font-family:Segoe UI,sans-serif;
    margin:0;
    background:#f4f8f5;
    color:#1c3b2f;
}
header{
    background:linear-gradient(90deg,#0f5132,#198754);
    color:white;
    padding:20px;
    text-align:center;
    font-weight:bold;
}
section{padding:30px 5%;}
h2{border-left:6px solid #c9a227;padding-left:10px;}

.calendar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}
.calendar-header button{
    background:#198754;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:6px;
    cursor:pointer;
}
.calendar-container{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
    max-width:1000px;
    margin:auto;
}
.calendar-box{
    background:white;
    border:1px solid #d4af37;
    border-radius:8px;
    padding:5px;
    font-size:10px;
    min-height:90px;
}
.calendar-box.today{
    background:#d1e7dd;
    border:2px solid #198754;
}
.day-header{
    text-align:center;
    font-weight:bold;
    font-size:11px;
}
.masehi{font-weight:bold;font-size:13px;}
.hijri{color:#8b5e00;}
.jawa{color:#6c757d;}
.cina{color:#b02a37;}
</style>
</head>
<body>

<header>Masjid Digital</header>

<section>
<h2>Kalender 4 Sistem</h2>

<div class="calendar-header">
<button onclick="changeMonth(-1)">◀</button>
<div id="monthYear"></div>
<button onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar-container" id="calendar"></div>
</section>

<script>
let currentDate = new Date();

/* ========================= */
/* ===== FUNGSI JAWA ======= */
/* ========================= */
function getJavanese(date){
    const days = ["Ahad","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const pasaran = ["Legi","Pahing","Pon","Wage","Kliwon"];
    let dayName = days[date.getDay()];
    let pasaranName = pasaran[Math.floor(date.getTime()/86400000)%5];
    return dayName + " " + pasaranName;
}

/* ========================= */
/* ===== FUNGSI CINA ======= */
/* ========================= */
function getChinese(date){

    const stems = [
        {name:"Jia", element:"Kayu"},
        {name:"Yi", element:"Kayu"},
        {name:"Bing", element:"Api"},
        {name:"Ding", element:"Api"},
        {name:"Wu", element:"Tanah"},
        {name:"Ji", element:"Tanah"},
        {name:"Geng", element:"Logam"},
        {name:"Xin", element:"Logam"},
        {name:"Ren", element:"Air"},
        {name:"Gui", element:"Air"}
    ];

    const branches = [
        "Tikus","Kerbau","Macan","Kelinci",
        "Naga","Ular","Kuda","Kambing",
        "Monyet","Ayam","Anjing","Babi"
    ];

    let formatter = new Intl.DateTimeFormat(
        'zh-CN-u-ca-chinese',
        {year:'numeric', month:'numeric', day:'numeric'}
    );

    let parts = formatter.formatToParts(date);

    let lunarYear = parseInt(parts.find(p=>p.type==="year").value);
    let lunarMonth = parseInt(parts.find(p=>p.type==="month").value);
    let lunarDay = parseInt(parts.find(p=>p.type==="day").value);

    if(isNaN(lunarYear)) return "";

    let stemIndex = (lunarYear - 4) % 10;
    let branchIndex = (lunarYear - 4) % 12;

    if(stemIndex < 0) stemIndex += 10;
    if(branchIndex < 0) branchIndex += 12;

    const monthNames = [
        "Zheng Yue","Er Yue","San Yue","Si Yue",
        "Wu Yue","Liu Yue","Qi Yue","Ba Yue",
        "Jiu Yue","Shi Yue","Shiyi Yue","Shier Yue"
    ];

    return `
Imlek ${date.getFullYear()+2697}<br>
${stems[stemIndex].element} ${branches[branchIndex]}<br>
Bulan ${lunarMonth} (${monthNames[lunarMonth-1]})<br>
Hari ${lunarDay}
`;
}

/* ========================= */
/* ===== RENDER KALENDER ==== */
/* ========================= */
function renderCalendar(){

    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    let year = currentDate.getFullYear();
    let month = currentDate.getMonth();

    document.getElementById("monthYear").innerText =
        currentDate.toLocaleString('id-ID',{month:'long',year:'numeric'});

    const firstDay = new Date(year,month,1);
    const lastDay = new Date(year,month+1,0);

    const dayHeaders = ["Ah","Sn","Sl","Rb","Km","Jm","Sb"];

    for(let i=0;i<7;i++){
        let div = document.createElement("div");
        div.className="day-header";
        div.innerText = dayHeaders[i];
        calendar.appendChild(div);
    }

    for(let i=0;i<firstDay.getDay();i++){
        calendar.appendChild(document.createElement("div"));
    }

    for(let d=1; d<=lastDay.getDate(); d++){

        let date = new Date(year,month,d);

        let hijriFull = new Intl.DateTimeFormat(
            'id-TN-u-ca-islamic',
            {day:'numeric', month:'long', year:'numeric'}
        ).format(date);

        let box = document.createElement("div");
        box.className="calendar-box";

        if(date.toDateString() === new Date().toDateString()){
            box.classList.add("today");
        }

        box.innerHTML = `
        <div class="masehi">${d}</div>
        <div class="hijri">${hijriFull}</div>
        <div class="jawa">${getJavanese(date)}</div>
        <div class="cina">${getChinese(date)}</div>
        `;

        calendar.appendChild(box);
    }
}

function changeMonth(step){
    currentDate.setMonth(currentDate.getMonth()+step);
    renderCalendar();
}

renderCalendar();
</script>

</body>
</html>
